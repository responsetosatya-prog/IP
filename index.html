<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌍 IP Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}
body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
padding:20px;
color:#fff;
}
.container{max-width:1100px;margin:auto}
h1{text-align:center;margin-bottom:20px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
}
.box{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border-radius:16px;
padding:18px;
cursor:pointer;
transition:.2s;
word-break:break-word;
}
.box:hover{transform:translateY(-3px)}
.label{font-size:12px;color:#cbd5e1}
.value{font-size:18px;font-weight:700;margin-top:8px}
#toast{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
padding:12px 18px;
border-radius:10px;
opacity:0;
transition:.3s;
z-index:9999;
}
.note{text-align:center;margin-bottom:20px;color:#cbd5e1}
</style>
</head>
<body>
<div id="toast"></div>

<div class="container">
<h1>🌍 IP Location Tracker</h1>
<p class="note">Click any card to copy its value</p>

<div class="grid">

<div class="box"><div class="label">IP Address</div><div class="value" id="ip">Loading...</div></div>
<div class="box"><div class="label">Country</div><div class="value" id="country">-</div></div>
<div class="box"><div class="label">Region</div><div class="value" id="region">-</div></div>
<div class="box"><div class="label">City</div><div class="value" id="city">-</div></div>
<div class="box"><div class="label">Postal Code</div><div class="value" id="postal">-</div></div>
<div class="box"><div class="label">Timezone</div><div class="value" id="timezone">-</div></div>
<div class="box"><div class="label">ISP / Organization</div><div class="value" id="org">-</div></div>
<div class="box"><div class="label">Location (Lat,Lng)</div><div class="value" id="loc">-</div></div>

</div>
</div>

<script>
let currentIP = "";
let blinkTimer = null;

function toast(msg){
 const t=document.getElementById("toast");
 t.textContent=msg;
 t.style.opacity="1";
 setTimeout(()=>t.style.opacity="0",1500);
}

async function loadIP(){
 try{
   const res = await fetch("https://ipinfo.io/json");
   const data = await res.json();

   document.getElementById("ip").textContent = data.ip || "-";
   document.getElementById("country").textContent = data.country || "-";
   document.getElementById("region").textContent = data.region || "-";
   document.getElementById("city").textContent = data.city || "-";
   document.getElementById("postal").textContent = data.postal || "-";
   document.getElementById("timezone").textContent = data.timezone || "-";
   document.getElementById("org").textContent = data.org || "-";
   document.getElementById("loc").textContent = data.loc || "-";

   if(!currentIP){
      currentIP = data.ip;
   }else if(data.ip !== currentIP){
      currentIP = data.ip;
      toast("IP Address Changed");
      startBlink();
      loadIP();
   }

 }catch(e){
   document.getElementById("ip").textContent="API Error";
 }
}

function startBlink(){
 if(blinkTimer) return;

 let state=true;

 blinkTimer=setInterval(()=>{
   document.title = state ? "⚠ IP CHANGED ⚠" : "🌍 IP Tracker";
   state=!state;
 },700);
}

document.addEventListener("click",async(e)=>{
 const box=e.target.closest(".box");
 if(!box) return;

 const value=box.querySelector(".value").textContent;
 try{
   await navigator.clipboard.writeText(value);
   toast("Copied: "+value);
 }catch(err){}
});

loadIP();
setInterval(loadIP,5000);
</script>
</body>
</html>
