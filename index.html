<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IP Tracker</title>

<link rel="icon" type="image/png" href="https://i.ibb.co/Y47MFfC9/image-2.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#070b14;
--card:rgba(255,255,255,.06);
--border:rgba(255,255,255,.12);
--text:#fff;
--muted:#9ca3af;
--accent:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{
background:
radial-gradient(circle at top left,#2563eb55,transparent 30%),
radial-gradient(circle at top right,#7c3aed55,transparent 30%),
linear-gradient(135deg,#070b14,#111827);
min-height:100vh;
color:var(--text);
overflow-x:hidden;
}
.container{max-width:1250px;margin:auto;padding:30px 20px}
.hero{
text-align:center;
padding:40px 0;
}
.badge{
display:inline-block;
padding:10px 18px;
border:1px solid var(--border);
background:rgba(255,255,255,.05);
border-radius:999px;
margin-bottom:18px;
backdrop-filter:blur(12px);
}
h1{
font-size:clamp(2.2rem,5vw,4rem);
font-weight:800;
background:linear-gradient(90deg,#60a5fa,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.subtitle{
margin-top:12px;
color:var(--muted);
max-width:700px;
margin-inline:auto;
}

.top-card{
margin-top:30px;
padding:25px;
border-radius:28px;
background:var(--card);
backdrop-filter:blur(20px);
border:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
}

.ip-big{
font-size:2rem;
font-weight:800;
}

.status{
padding:10px 16px;
border-radius:999px;
background:#16a34a22;
border:1px solid #16a34a66;
}

.grid{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
background:var(--card);
border:1px solid var(--border);
backdrop-filter:blur(18px);
border-radius:24px;
padding:22px;
cursor:pointer;
transition:.25s;
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(135deg,#60a5fa10,#a78bfa10);
opacity:0;
transition:.25s;
}

.card:hover::before{opacity:1}
.card:hover{
transform:translateY(-6px);
border-color:#60a5fa66;
}

.label{
font-size:.8rem;
text-transform:uppercase;
letter-spacing:1px;
color:var(--muted);
margin-bottom:10px;
}

.value{
font-size:1.2rem;
font-weight:700;
word-break:break-word;
}

.footer{
margin-top:30px;
text-align:center;
color:var(--muted);
}

#toast{
position:fixed;
right:20px;
top:20px;
padding:14px 18px;
border-radius:14px;
background:#111827;
border:1px solid #60a5fa55;
backdrop-filter:blur(20px);
opacity:0;
transform:translateY(-10px);
transition:.3s;
z-index:9999;
}

.glow{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
background:#3b82f633;
filter:blur(100px);
pointer-events:none;
}

.g1{top:-100px;left:-100px}
.g2{bottom:-100px;right:-100px}

@media(max-width:700px){
.ip-big{font-size:1.3rem}
}
</style>
</head>
<body>

<div class="glow g1"></div>
<div class="glow g2"></div>
<div id="toast"></div>

<div class="container">

<div class="hero">
<div class="badge">Survey Capture's</div>
<h1>📍 IP Tracker</h1>
<div class="subtitle">
IP will inform you if it change while using the proxy.
</div>
</div>

<div class="top-card">
<div>
<div style="color:#9ca3af">Current IP Address</div>
<div class="ip-big" id="ipMain">Loading...</div>
</div>
<div class="status" id="status">Monitoring IP Changes</div>
</div>

<div class="grid">
<div class="card"><div class="label">IP Address</div><div class="value" id="ip">-</div></div>
<div class="card"><div class="label">Country</div><div class="value" id="country">-</div></div>
<div class="card"><div class="label">Region / State</div><div class="value" id="region">-</div></div>
<div class="card"><div class="label">City</div><div class="value" id="city">-</div></div>
<div class="card"><div class="label">Postal Code</div><div class="value" id="postal">-</div></div>
<div class="card"><div class="label">Timezone</div><div class="value" id="timezone">-</div></div>
<div class="card"><div class="label">Organization</div><div class="value" id="org">-</div></div>
<div class="card"><div class="label">Coordinates</div><div class="value" id="loc">-</div></div>
</div>

<div class="footer">
Made by Satyam (Sr. Research Associate)
</div>

</div>

<script>
let currentIP="";
let blinker=null;

function toast(msg){
 const t=document.getElementById("toast");
 t.textContent=msg;
 t.style.opacity="1";
 t.style.transform="translateY(0)";
 setTimeout(()=>{
   t.style.opacity="0";
   t.style.transform="translateY(-10px)";
 },1800);
}

async function loadData(){
 try{
  const res=await fetch("https://ipinfo.io/json");
  const data=await res.json();

  const fields={
   ip:data.ip,
   country:data.country,
   region:data.region,
   city:data.city,
   postal:data.postal,
   timezone:data.timezone,
   org:data.org,
   loc:data.loc
  };

  for(const id in fields){
   const el=document.getElementById(id);
   if(el) el.textContent=fields[id]||"-";
  }

  document.getElementById("ipMain").textContent=data.ip||"-";

  if(!currentIP){
    currentIP=data.ip;
  }else if(data.ip!==currentIP){
    currentIP=data.ip;
    toast("IP Address Changed");
    startBlink();
  }

 }catch(e){
  document.getElementById("ipMain").textContent="API Error";
 }
}

function startBlink(){
 if(blinker) return;
 let x=true;
 blinker=setInterval(()=>{
   document.title=x?"⚠ IP CHANGED":"🌍 IP Tracker Pro";
   x=!x;
 },700);
}

document.querySelectorAll(".card").forEach(card=>{
 card.addEventListener("click",async()=>{
   const value=card.querySelector(".value").textContent;
   try{
    await navigator.clipboard.writeText(value);
    toast("Copied: "+value);
   }catch(e){}
 });
});

loadData();
setInterval(loadData,5000);
</script>
</body>
</html>
